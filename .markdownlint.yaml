# Markdownlint configuration
# https://github.com/DavidAnson/markdownlint/blob/main/doc/Rules.md
default: true

# Allow HTML in markdown (useful for badges, etc.)
MD033: false

# Line length — disable to avoid fighting with long URLs or code blocks
MD013: false

# Table formatting — disabling prevents the auto-fixer from reflowing tables.
# MD055 expands separator hyphens to match column widths; MD060 flags mixed
# styles (e.g. spaced header rows with a tight |---|---| separator).
MD055: false
MD060: false
